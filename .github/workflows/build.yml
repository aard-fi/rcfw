name: Build Firmware Variants

# we're intentionally not using matrix builds here - we can build all variants
# with the makefile for easy local testing, so we're just using that. Drawback
# is that it is sequential, but the firmware is small enough that it doesn't
# matter much.
on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ARDUINO_DIRECTORIES_USER: ${{ github.workspace }}/sketchbook

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2
        with:
          version: '1.x'

      - name: Prepare sketchbook directory
        run: mkdir -p ${{ github.workspace }}/sketchbook/libraries

      - name: Cache Arduino packages and libraries
        uses: actions/cache@v5
        with:
          path: |
            ~/.arduino15/packages
            ${{ github.workspace }}/sketchbook/libraries
          key: arduino-libs-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install cores
        run: |
          arduino-cli config init
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install arduino:megaavr

      - name: Install libraries
        run: |
          arduino-cli lib install Servo
          # AlfredoCRSF is not in the Arduino Library Manager (or at least
          # not in a recent enough version)
          arduino-cli lib install --git-url https://github.com/AlfredoSystems/AlfredoCRSF.git
          # Same for IBusBM, the version from Library Manager is incompatible
          # with megaavr
          arduino-cli lib install --git-url https://github.com/bmellink/IBusBM.git

      - name: Build all variants
        run: |
          make ARDUINO_USER_DIR=${{ github.workspace }}/sketchbook all-variants

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-all
          path: firmware/*.hex

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: firmware-all
          path: firmware

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" firmware/*.hex \
            --generate-notes
